name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # 정적 내보내기 모드. Cloudflare 빌드에는 이 변수를 주지 않으므로 서버 모드로
      # 빌드되어 /api/route-institution 이 동작한다. 두 배포가 동시에 살아 있다.
      STATIC_EXPORT: "1"
      NEXT_PUBLIC_BASE_PATH: /how-did-they-do-all-that-procurement
      # 정규 주소는 Cloudflare다. Pages는 AI 기능이 없는 정적 사본이므로,
      # canonical·OG·sitemap이 Pages를 가리키면 검색엔진이 사본을 본체로 삼는다.
      NEXT_PUBLIC_SITE_URL: https://how-did-they-do-all-that-procurement.dali-n-narumi.workers.dev
      NEXT_PUBLIC_ANALYTICS_ENDPOINT: ${{ vars.ANALYTICS_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Korean fonts for process map rendering
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk
        working-directory: .
      - run: npm ci
      - run: npm run build
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
